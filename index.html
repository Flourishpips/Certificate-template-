<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>Certificate</title>
    <link rel="stylesheet" href="certt.css">

</head>
<body class=" bg-black p-[50px]">
    <div class="cert_Container w-[800px] content-center h-[600px] bg-white mx-auto my-[20px] relative">
        <div class="w-0 h-0 border-t-[350px] border-t-[#dbcca5] border-r-[350px] border-r-transparent absolute top-0 left-0 z-20"></div>
        <div class="w-0 h-0 border-t-[400px] border-t-[#fffae0] border-r-[370px] border-r-transparent absolute top-0 left-0 z-10"></div>

        <div class="absolute w-0 h-0 border-t-[350px] border-t-transparent border-r-[350px] border-r-[#dbcca5] bottom-0 right-0 z-20"></div>
        <div class="absolute w-0 h-0 border-t-[400px] border-t-transparent border-r-[370px] border-r-[#fffae0] bottom-0 right-0 z-10"></div>
        <div class="container place-self-center w-[750px] h-[550px] border-5 border-black bg-[#fffae0] grid grid-cols-1 grid-rows-3 relative z-30">
            <img class="medal absolute w-[150px] h-[150px] left-[40px] top-[10px]" src="assets/Medal.png" alt="">
            <h1 class="cert text-5xl justify-self-center m-[20px] text-[#503508] font-serif absolute top-[50px]">CERTIFICATE</h1>
            <hr class="left_line w-[50px] absolute left-[220px] top-[138px]">
            <p class="Participation justify-self-center text-black absolute top-[120px] text-xl font-semibold">of participation</p>
            <hr class="right_line h-[5px] w-[50px] absolute right-[220px] top-[138px]">
            <p class="proud absolute justify-self-center top-[170px] font-semibold text-black font-sans text-sm">WE ARE PROUDLY PRESENTING THIS TO</p>
            <p class="name absolute top-[210px] text-[#503508] text-4xl justify-self-center">Kimberly Thompson</p>
            <hr class="line w-[300px] absolute justify-self-center top-[270px] h-[5px]">
            <p class="absolute justify-self-center top-[280px] text-center font-semibold font-[Tapestry] text-black">Course Title</p>
            <p class="description absolute top-[310px] text-black text-center text-xs justify-self-center font-semibold">We give this certificate because Kimberly Thompson has participated in a social <br>event that we organize.</p>
            <div class="absolute justify-self-center flex bottom-[150px] gap-2">
                <p class="text-lg text-black">Date: </p>
                <hr class="w-[100px] self-end">
            </div>
            <div class="signature absolute gap-[180px] bottom-[40px] flex justify-self-center">
                <span class="president grid justify-center gap-[5px]">
                    <hr class="prt w-[150px] justify-self-center">
                    <p class="text-xl justify-self-center">Isabel Mercado</p>
                    <p class="text-lg justify-self-center">President</p>
                </span>
                <span class="president grid justify-center gap-[5px]">
                    <hr class="prt w-[150px] justify-self-center">
                    <p class="text-xl justify-self-center">Kimberly Nguyen</p>
                    <p class="text-lg justify-self-center">Vice President</p>
                </span>

            </div>

        </div>
    </div>
</body>
</html>
